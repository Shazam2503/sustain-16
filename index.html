<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sustain 16</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Screen 1: Intro -->
    <div id="screen-intro" class="screen active">
      <img src="images/hero.jpg" alt="Sustain 16" class="hero-img">
      <div id="play-btn-overlay"></div>
    </div>

    <!-- Screen 2: Mode Select -->
    <div id="screen-mode" class="screen">
      <div class="mode-half mode-single">
        <div class="mode-content">
          <span class="mode-title">Single Player Mode</span>
        </div>
      </div>
      <div class="mode-half mode-duo">
        <div class="mode-content">
          <span class="mode-launching">Launching Soon</span>
          <span class="mode-duo-label">Duo Player Mode 🎮</span>
        </div>
      </div>
    </div>

    <!-- Screen 3: Topic Select -->
    <div id="screen-topic" class="screen">
      <div class="topic-half topic-left">
        <div class="topic-content">
          <span class="topic-title">Theme 1</span>
          <span class="topic-subtitle">Off the beaten path, on purpose.</span>
        </div>
      </div>
      <div class="topic-half topic-right">
        <div class="topic-content">
          <span class="topic-title">Theme 2</span>
        </div>
      </div>
    </div>

    <!-- Screen 4a: Puzzle 1 (placeholder) -->
    <div id="screen-puzzle-1" class="screen">
      <p>Puzzle 1 — coming soon</p>
    </div>

    <!-- Screen 4b: Puzzle 2 (placeholder) -->
    <div id="screen-puzzle-2" class="screen">
      <p>Puzzle 2 — coming soon</p>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
